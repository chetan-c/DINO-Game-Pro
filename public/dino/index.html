<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Dino Run</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrap">
    <div class="hud">
      <div class="score">HI <span id="hi">00000</span> &nbsp; <span id="score">00000</span></div>
    </div>
    <canvas id="game" width="800" height="260"></canvas>

    <div id="overlay" class="overlay">
      <div class="panel">
        <h1 id="title">DINO RUN</h1>
        <p id="subtitle">Press SPACE / ▲ or Tap to jump</p>
        <button id="startBtn">START GAME</button>
      </div>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
