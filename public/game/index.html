<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Dino Run Pro</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="theme-dark">
  <div id="app" class="app">
    <!-- HUD -->
    <header class="hud">
      <div class="hud-left">
        <button id="pauseBtn" class="icon-btn" title="Pause (P)">⏸</button>
        <button id="muteBtn" class="icon-btn" title="Mute">🔊</button>
        <button id="themeBtn" class="icon-btn" title="Theme">🌙</button>
      </div>
      <div class="hud-center">
        <div class="power-wrap" title="Special (S)">
          <div class="power-label">POWER</div>
          <div class="power-bar"><div id="powerFill" class="power-fill"></div></div>
        </div>
      </div>
      <div class="hud-right">
        <div class="score-block">
          <div class="score-row"><span class="muted">HI</span> <span id="hi">00000</span></div>
          <div class="score-row big"><span id="score">00000</span></div>
          <div class="score-row tiny"><span class="muted">x</span><span id="combo">1</span></div>
        </div>
      </div>
    </header>

    <!-- Game canvas -->
    <main class="stage">
      <canvas id="game" width="960" height="320"></canvas>

      <!-- Achievement toast -->
      <div id="toast" class="toast"></div>

      <!-- Pause overlay -->
      <div id="pauseOverlay" class="overlay hidden">
        <div class="panel small">
          <h2>PAUSED</h2>
          <p class="muted">Press P or tap to resume</p>
          <button id="resumeBtn" class="btn primary">RESUME</button>
        </div>
      </div>

      <!-- Start / Game Over overlay -->
      <div id="overlay" class="overlay">
        <div class="panel">
          <h1 id="title" class="title">DINO RUN <span class="accent">PRO</span></h1>
          <p id="subtitle" class="muted">Choose your runner</p>

          <div id="charPicker" class="chars">
            <button class="char" data-char="dino">
              <div class="char-art dino-art"></div>
              <div class="char-name">DINO</div>
              <div class="char-stats">JUMP ●●○ &nbsp; SPD ●●○ &nbsp; ATK ●○○</div>
            </button>
            <button class="char" data-char="robot">
              <div class="char-art robot-art"></div>
              <div class="char-name">ROBOT</div>
              <div class="char-stats">JUMP ●○○ &nbsp; SPD ●●● &nbsp; ATK ●●○</div>
            </button>
            <button class="char" data-char="ninja">
              <div class="char-art ninja-art"></div>
              <div class="char-name">NINJA</div>
              <div class="char-stats">JUMP ●●● &nbsp; SPD ●●○ &nbsp; ATK ●●●</div>
            </button>
          </div>

          <div id="finalScore" class="final hidden">
            <div><span class="muted">SCORE</span><b id="finalScoreVal">00000</b></div>
            <div><span class="muted">HI</span><b id="finalHiVal">00000</b></div>
          </div>

          <button id="startBtn" class="btn primary big">START GAME</button>
          <p class="hint muted">SPACE/▲ Jump &nbsp;·&nbsp; A Attack &nbsp;·&nbsp; S Special &nbsp;·&nbsp; P Pause</p>
        </div>
      </div>
    </main>

    <!-- Mobile controls -->
    <div class="mobile-ctrls" id="mobileCtrls">
      <button class="m-btn" id="mJump">▲<span>JUMP</span></button>
      <button class="m-btn" id="mAttack">⚔<span>ATK</span></button>
      <button class="m-btn" id="mSpecial">★<span>SPC</span></button>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
